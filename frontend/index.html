<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMerge Preview</title>

    <!-- [B1] CSS แยกโฟลเดอร์ใหม่ — โหลดตามลำดับ: tokens → layout → components -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <div class="container">
        <h1>AutoMerge Document Aggregator</h1>
        <p>Simple File Upload &amp; Preview (Safe Zone)</p>

        <div class="upload-section">
            <input type="file" id="fileInput" accept=".csv, .xlsx, .xls" multiple>
            <button id="uploadBtn">Upload Files</button>
            <p id="uploadStatus"></p>
        </div>

        <div id="queueSection" class="queue-section hidden">
            <h3>Selected Files Queue</h3>
            <ul id="fileQueueList" class="queue-list"></ul>
        </div>

        <div id="uploadedSection" class="uploaded-section hidden">
            <h3>Successfully Uploaded Files</h3>
            <p class="help-text">Click Preview to view the first 10 rows of a specific file.</p>
            <ul id="uploadedFileList" class="queue-list"></ul>
        </div>

        <div id="previewSection" class="hidden">
            <h3 id="previewTitle">Data Preview</h3>
            <div id="tableContainer"></div>
            <pre id="jsonPreview"></pre>
        </div>
    </div>

    <!-- [B1] JS โหลดตามลำดับที่ถูกต้อง: config → state → api → renderer → app -->
    <!-- state.js, api.js, renderer.js ยังว่างอยู่ในขั้นตอนนี้ — ไม่กระทบ Logic -->
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/api.js"></script>
    <script src="js/renderer.js"></script>
    <script src="app.js"></script>
</body>

</html>
